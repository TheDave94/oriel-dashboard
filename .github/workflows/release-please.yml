name: Release Please

# Manages version bumps + changelog + tags via conventional commits.
#
# How it works:
# 1. On every push to main, this workflow checks the commits since the last
#    release. If any commits follow Conventional Commits format (feat:, fix:,
#    feat!: etc.), it maintains a permanent "Release PR" that:
#      - bumps package.json's version (patch / minor / major based on commits)
#      - updates CHANGELOG.md
# 2. When the maintainer merges that PR, release-please creates a git tag
#    and a GitHub Release with the changelog as the body.
# 3. The release event triggers .github/workflows/release-build.yml, which
#    builds dist/ and attaches a zip as a release asset for HACS.
#
# The maintainer's job is simply to merge the Release PR when ready —
# no manual version bumps, no manual changelog edits, no manual tagging.
#
# ## Why a GitHub App token
#
# GitHub intentionally suppresses downstream workflow triggers from events
# that originated via GITHUB_TOKEN (anti-loop guarantee). When release-please
# ran under GITHUB_TOKEN, the resulting `release: published` event did NOT
# fire release-build.yml — v4.6.0 and v4.7.0 both needed manual workflow
# dispatches. The fix: mint a short-lived installation token from the
# `oriel-release-bot` GitHub App and pass it to release-please. App-token
# events are not suppressed.
#
# See docs/RELEASE-INFRASTRUCTURE.md for the App setup, permissions list,
# rotation procedure, and troubleshooting.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Both permissions are now satisfied by the App-token in the workflow steps
# below, but we keep these set so the workflow's intent is documented and
# so the GITHUB_TOKEN still has a sensible scope if anything in this file
# ever needs it for a fallback or debug step.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived installation token from oriel-release-bot.
      # The App's RELEASE_APP_CLIENT_ID + RELEASE_APP_PRIVATE_KEY repo
      # secrets drive the exchange. Pinned by SHA per the repo's
      # third-party-action policy; current SHA is v3.2.0.
      #
      # We use `client-id` (the App's Client ID, looks like `Iv23li…`)
      # rather than `app-id` (the plain integer App ID) — v3.x of
      # create-github-app-token deprecated the `app-id` input. Both
      # identifiers reference the same App; Client ID is the newer-
      # recommended input.
      - name: Mint release-bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # release-please now runs under the App identity. Commits it
      # pushes + PRs it opens + releases it creates all carry the App
      # actor — so the resulting `release: published` event triggers
      # release-build.yml the normal way (the GITHUB_TOKEN anti-loop
      # suppression doesn't apply to App-initiated events).
      #
      # SHA-pinned to v5.0.0. v5's only breaking change versus v4 is the
      # runtime bump (Node 20 → Node 24); the action's inputs (`token`,
      # `release-type`) and outputs (`release_created`, `tag_name`,
      # `prs_created`, `pr`) are unchanged. Bump deliberately when a
      # new version is reviewed.
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: node

      # ## Autonomous release flow
      #
      # Arms GitHub's native auto-merge on the release PR as soon as
      # release-please opens or updates it. GitHub merges the PR
      # automatically once the 6 required branch-protection checks
      # pass (Unit tests, ESLint, Translation Lint, HA version-marker
      # check, Bundle size budget, npm audit (moderate+)). The merge
      # runs under the App actor — same identity as release-please
      # itself — so the resulting `release: published` event still
      # triggers release-build.yml without the GITHUB_TOKEN anti-loop
      # suppression kicking in. End-to-end: conventional commit lands
      # on main → release-please opens/updates a release PR → this
      # step arms auto-merge → required checks pass → GitHub merges →
      # release-please tags + publishes the release → release-build
      # uploads assets. No human in the loop.
      #
      # Gating: `prs_created == 'true'` means release-please created
      # OR updated a PR this run. On runs where there's nothing
      # release-worthy since the last release, prs_created is `'false'`
      # and this step no-ops cleanly. Re-arming auto-merge on a PR
      # that already has it enabled is idempotent.
      #
      # `--auto`: GitHub's native auto-merge — pending until required
      # checks pass, then merges in the background. If checks were
      # already green when this step runs (rare; only on a re-run),
      # the merge is immediate. `--squash` matches the repo's merge
      # style. Branch deletion is governed by the repo-level
      # `delete_branch_on_merge` setting (currently false — release-
      # please owns its own branch lifecycle); we deliberately do
      # NOT pass `--delete-branch` here.
      #
      # Live-HA e2e (tests/e2e/* + tests/e2e-browser/*) is
      # DELIBERATELY NOT in the required-checks set — see DEFERRED.md
      # → "Live-HA e2e stays local-manual" for the reasoning. Releases
      # ship on unit-test green, not on live-HA verification.
      #
      # ## How to pause autonomous releasing
      #
      # 1. UI: Settings → General → Pull Requests → untick "Allow
      #    auto-merge". This step then fails-soft on subsequent runs
      #    (the API call errors and the release PR sits open for
      #    manual merge). Already-armed PRs continue to merge when
      #    checks pass — to stop those, cancel auto-merge on each via
      #    the PR UI.
      # 2. Workflow: comment out this step. New release PRs stay open
      #    for manual merge; already-armed PRs are unaffected.
      - name: Arm native auto-merge on release PR
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge ${{ fromJSON(steps.release.outputs.pr).number }} \
            --auto --squash \
            -R ${{ github.repository }}
