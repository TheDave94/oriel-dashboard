name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      # HACS Validation calls into the live HACS pipeline, which is not
      # hermetic — the load step occasionally fails fast with
      #   "Repository structure for refs/heads/main is not compliant"
      #   "Repository TheDave94/oriel-dashboard not loaded properly in HACS"
      # within ~1-2 seconds of starting, when GitHub API or the HACS
      # registry serves stale state (most often right after a release-
      # please tag-and-publish on the post-merge push run). See the
      # May 2026 CI health investigation: 14/100 runs hit this flake.
      #
      # Pattern: up to 3 attempts (initial + 2 retries) with 30 s
      # backoff. The first two run with continue-on-error so their
      # failures don't fail the job; the final attempt has no shield,
      # so its exit code drives job conclusion. A genuine structural
      # break is deterministic and will fail all three attempts → job
      # goes red as it should. The transient flake (the >95 % case)
      # clears on retry. No demotion to non-blocking, no
      # continue-on-error on the final attempt.
      #
      # nick-fields/retry was the originally-requested tool but it
      # wraps shell `command:`, not `uses:` actions, and replicating
      # hacs/action's docker invocation in shell would couple us to
      # upstream's internals. Wandalen/wretry.action wraps `uses:`
      # natively if we ever want that instead.
      - name: HACS Validation (attempt 1)
        id: hacs_attempt_1
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main @ 2026-05-20
        continue-on-error: true
        with:
          category: plugin
      - name: Backoff before retry 1
        if: steps.hacs_attempt_1.outcome == 'failure'
        run: sleep 30
      - name: HACS Validation (attempt 2)
        id: hacs_attempt_2
        if: steps.hacs_attempt_1.outcome == 'failure'
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main @ 2026-05-20
        continue-on-error: true
        with:
          category: plugin
      - name: Backoff before retry 2
        if: steps.hacs_attempt_1.outcome == 'failure' && steps.hacs_attempt_2.outcome == 'failure'
        run: sleep 30
      - name: HACS Validation (attempt 3, final)
        if: steps.hacs_attempt_1.outcome == 'failure' && steps.hacs_attempt_2.outcome == 'failure'
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main @ 2026-05-20
        with:
          category: plugin

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run ESLint
        run: npm run lint

  translations:
    name: Translation Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
      - name: Lint translation files
        run: node scripts/lint-translations.mjs

  ha-version-markers:
    name: HA version-marker check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
      # Guards against silent bumps to the minimum HA version.
      # hacs.json declares the floor; this script fails if src/ uses
      # any API introduced in a strictly newer HA than that floor.
      # See scripts/check-ha-version-markers.mjs for the marker list +
      # the bump procedure.
      - name: Check HA version markers
        run: node scripts/check-ha-version-markers.mjs

  audit:
    name: npm audit (moderate+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Surfaces moderate + high + critical advisories on production
      # deps. Non-prod deps are excluded so a vitest dev-only
      # vulnerability doesn't block the release pipeline, but anything
      # user-installable through HACS gates here (review §B-2).
      - run: npm audit --audit-level=moderate --omit=dev

  bundle-size:
    name: Bundle size budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Per-chunk gzipped size budgets — fails the build if any chunk
      # crosses a threshold. Tune the limits up only with a deliberate
      # PR; surprise regressions get caught here.
      - name: Check bundle sizes
        run: |
          set -e
          fail=0
          check() { # check <pattern> <max_kb>
            local pat="$1" max="$2"
            local file=$(ls dist/$pat 2>/dev/null | head -1)
            if [ -z "$file" ]; then
              echo "  MISSING: $pat"; fail=1; return
            fi
            local size=$(stat -c%s "$file")
            local kb=$((size / 1024))
            if [ "$kb" -gt "$max" ]; then
              echo "  OVER:  $file = ${kb}KB (limit ${max}KB)"; fail=1
            else
              echo "  OK:    $file = ${kb}KB / ${max}KB"
            fi
          }
          echo "Bundle-size budget (gzipped):"
          check "oriel.js.gz" 5
          # v4.6.0 — core budget raised from 50 → 60 KB to absorb:
          #   - Extension API v2 helpers (escapeHtml, isValidShape,
          #     attribution-footer) staying in the registry module that
          #     loads at strategy generate-time
          #   - ~50 new translation keys (health.* + favorites_* +
          #     live_preview_* + viewport_*) which bundle into core via
          #     localize.ts's static JSON imports
          # v4.15 — raised 60 → 65 KB to absorb:
          #   - oriel-pollen-card (Lit element + per-source severity
          #     mapping + i18n keys for the PollenWatch integration)
          # v4.16 — raised 65 → 67 KB to absorb the PollenWatch v2
          # expansion: 18 new canonical species labels (en/de), 3 new
          # raw sources (DWD / MeteoSwiss / ePIN) with their own
          # bucketing branches, the `mixed` consensus state, and the
          # `pollen_show_inactive` editor toggle + descriptions.
          # Growth is ~1KB gzipped; budget set with headroom for future
          # locale expansion without churning this file on every PR.
          check "oriel-core.*.js.gz" 67
          check "oriel-views.*.js.gz" 20
          check "oriel-editor.*.js.gz" 80
          check "oriel-lit.*.js.gz" 25
          exit $fail
