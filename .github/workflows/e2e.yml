name: E2E

# Intentionally workflow_dispatch-only — see DEFERRED.md
# (§"Live-HA e2e stays local-manual…") for the full rationale.
#
# Short version: oriel-dashboard is a public repo and HA 2026.5.x
# has no fine-grained access tokens, so HA_TOKEN is full admin scope.
# We deliberately do NOT register HA_URL / HA_TOKEN as repo secrets.
# Day-to-day verification happens locally via `.env.local` —
# `npm run e2e:api` and `npm run e2e:browser` — and the unit-test
# gate (vitest 4, 391 tests) carries CI. The dispatch trigger below
# is a manual escape hatch; the operator supplies a token at
# dispatch time and it's not persisted in repo state.
on:
  workflow_dispatch:
    inputs:
      ha_url:
        description: 'HA URL (defaults to repository secret HA_URL — currently unset by design)'
        required: false
        type: string

jobs:
  api-smoke:
    name: API smoke (real HA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run API smoke
        env:
          HA_URL: ${{ inputs.ha_url || secrets.HA_URL }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
        run: npx vitest run tests/e2e/strategy-api.test.ts

  browser:
    name: Browser E2E (Playwright, real HA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Installs Chromium + the system libs it needs. Ubuntu runners
      # have most of them; `--with-deps` fills the rest via apt.
      - run: npx playwright install --with-deps chromium
      - name: Run browser E2E
        env:
          HA_URL: ${{ inputs.ha_url || secrets.HA_URL }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
